name: "Run test suite"
description: |
  Composite action that runs a single test type (unit/contract/schema/integration/acceptance),
  uploads the test artefacts, and publishes a JUnit summary to the GitHub Actions job.
  Delegates to `make test-<type>` which invokes scripts/tests/run-test.sh.
  For remote tests, pass apigee-access-token to authenticate with the APIM proxy.

inputs:
  test-type:
    description: "Test type: unit, contract, schema, integration, acceptance"
    required: true
  apigee-access-token:
    description: "Apigee access token (if needed)"
    required: false
    default: ""
  env:
    description: "Environment: local or remote"
    required: false
    default: "remote"
  apim_client_key_secret_name:
    description: "Secret name of the APIM client certificate key (if needed)"
    required: false
    default: ""
  apim_client_cert_secret_name:
    description: "Secret name of the APIM client certificate (if needed)"
    required: false
    default: ""
  pdm_mock_document_url:
    description: "PDM mock document URL (if needed)"
    required: false
    default: ""
  mns_mock_events_url:
    description: "MNS mock events URL (if needed)"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: "Run ${{ inputs.test-type }} tests"
      shell: bash
      env:
        APIGEE_ACCESS_TOKEN: ${{ inputs.apigee-access-token }}
        ENV: ${{ inputs.env }}
        TEST_TYPE: ${{ inputs.test-type }}
        CLIENT_KEY_NAME: ${{ inputs.apim_client_key_secret_name }}
        CLIENT_CERT_NAME: ${{ inputs.apim_client_cert_secret_name }}
        PDM_MOCK_DOCUMENT_URL: ${{ inputs.pdm_mock_document_url }}
        MNS_MOCK_EVENTS_URL: ${{ inputs.mns_mock_events_url }}
      run: |
        if [[ -n "${APIGEE_ACCESS_TOKEN}" ]]; then
          echo "::add-mask::${APIGEE_ACCESS_TOKEN}"
        fi

        if [[ -n "${CLIENT_KEY_NAME}" ]]; then
          echo "Using APIM client certificate key from name: ${CLIENT_KEY_NAME}"
          CLIENT_KEY=$(printf '%s' "$CLIENT_KEY_NAME")
        fi

        if [[ -n "${CLIENT_CERT_NAME}" ]]; then
          echo "Using APIM client certificate from name: ${CLIENT_CERT_NAME}"
          CLIENT_CERT=$(printf '%s' "$CLIENT_CERT_NAME")
        fi

        make test-${TEST_TYPE}

    - name: "Upload ${{ inputs.test-type }} test results"
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: ${{ inputs.test-type }}-test-results
        path: pathology-api/test-artefacts/
        retention-days: 30

    - name: "Check ${{ inputs.test-type }}-tests.xml exists"
      id: check
      if: always()
      shell: bash
      env:
        TEST_TYPE: ${{ inputs.test-type }}
      run: |
        if [[ -f "pathology-api/test-artefacts/${TEST_TYPE}-tests.xml" ]]; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: "Publish ${{ inputs.test-type }} test results to summary"
      if: ${{ always() && steps.check.outputs.exists == 'true' }}
      uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86
      with:
        paths: pathology-api/test-artefacts/${{ inputs.test-type }}-tests.xml
